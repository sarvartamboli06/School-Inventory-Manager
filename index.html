<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Stationery Inventory & Automated Billing System</title>
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- SheetJS for Excel Uploads -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <!-- QRCode for Payment QR -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

    <!-- html2pdf for Receipt Exports -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- UI Styles -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div id="app">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header" style="flex-direction: column; align-items: flex-start; gap: 4px; padding-bottom: 20px;">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <i class="ph ph-books sidebar-logo-icon"></i>
                    <h2>EduBilling</h2>
                </div>
                <div id="sidebar-school-pill" onclick="window.location.href='select-school.html'" style="margin-top: 12px; background: var(--bg-color); border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 6px; cursor: pointer; width: 100%; justify-content: space-between; transition: 0.2s;" onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='var(--border)'">
                    <div style="display: flex; align-items: center; gap: 6px; overflow: hidden;">
                        <i class="ph ph-buildings" style="color: var(--primary);"></i>
                        <span id="sidebar-school-name" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Loading...</span>
                    </div>
                    <i class="ph ph-arrows-left-right" style="color: var(--text-muted); font-size: 1rem;"></i>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#/" class="nav-item active"><i class="ph ph-squares-four"></i> Dashboard</a>
                <a href="#/books" class="nav-item"><i class="ph ph-books"></i> Book Lists</a>
                <a href="#/students" class="nav-item"><i class="ph ph-users"></i> Students</a>
                <a href="#/inventory" class="nav-item"><i class="ph ph-archive-box"></i> Inventory</a>
                <a href="#/billing" class="nav-item" id="nav-billing"><i class="ph ph-receipt"></i> Generate Bill</a>
                <a href="#/invoices" class="nav-item" id="nav-invoices"><i class="ph ph-file-text"></i> Invoices</a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-ghost" id="sidebar-logout-btn"><i class="ph ph-sign-out"></i> Logout</button>
            </div>
        </aside>

        <div class="main-wrapper">
            <header id="header" class="header">
                <div class="header-search">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" placeholder="Search...">
                </div>
                <div class="header-actions">
                    <!-- Notification Bell -->
                    <div style="position: relative;">
                        <button class="icon-btn" id="notification-bell" style="position: relative;">
                            <i class="ph ph-bell"></i>
                            <span id="notification-badge" style="display: none; position: absolute; top: 0; right: 0; background: #EF4444; color: white; font-size: 0.65rem; font-weight: 800; border-radius: 50%; min-width: 16px; height: 16px; align-items: center; justify-content: center; transform: translate(25%, -25%); border: 2px solid white;">0</span>
                        </button>
                        <div id="notification-dropdown" class="card fade-in" style="display: none; position: absolute; top: 120%; right: 0; width: 320px; z-index: 1000; padding: 0; box-shadow: var(--shadow-lg); border: 1px solid var(--border); overflow: hidden;">
                            <div style="padding: 12px 16px; background: #F8FAFC; border-bottom: 1px solid var(--border); font-weight: 700; color: var(--text-main); display: flex; justify-content: space-between; align-items: center;">
                                <span>Low Stock Alerts</span>
                                <i class="ph ph-warning" style="color: #F59E0B; font-size: 1.1rem;"></i>
                            </div>
                            <ul id="notification-list" style="list-style: none; margin: 0; padding: 0; max-height: 300px; overflow-y: auto;">
                                <li style="padding: 16px; text-align: center; color: var(--text-muted); font-size: 0.9rem;"><i class="ph ph-check-circle" style="color: #10B981; font-size: 1.25rem; vertical-align: text-bottom; margin-right: 4px;"></i> You're all caught up!</li>
                            </ul>
                        </div>
                    </div>

                    <div class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=Admin+User&background=0D8ABC&color=fff" alt="Admin">
                        <span>Admin</span>
                    </div>
                </div>
            </header>
            
            <main id="main-content" class="main-content">
                <!-- Views will be dynamically injected here -->
            </main>
        </div>
    </div>

    <!-- Application Scripts -->
    <script type="module" src="js/app.js?v=1002"></script>
</body>
</html>
